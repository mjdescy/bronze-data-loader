name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  publish:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            asset-name: bronze-data-loader-win-x64.exe
            built-file: bronze-data-loader.exe
          - os: ubuntu-latest
            rid: linux-x64
            asset-name: bronze-data-loader-linux-x64
            built-file: bronze-data-loader
          - os: macos-latest
            rid: osx-x64
            asset-name: bronze-data-loader-osx-x64
            built-file: bronze-data-loader
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.301"

      - name: Publish single-file executable
        run: >
          dotnet publish src/BronzeDataLoader.Console
          -c Release -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -o publish

      - name: Rename for unique release asset name
        shell: bash
        run: mv publish/${{ matrix.built-file }} publish/${{ matrix.asset-name }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: publish/${{ matrix.asset-name }}
